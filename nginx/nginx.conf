worker_processes auto;
events {
  worker_connections 4096;
}

http {
  upstream nextjs_upstream {
    least_conn;
    server app:3000;
    keepalive 64;
  }

  upstream socketio_upstream {
    ip_hash; # sticky sessions for WebSocket
    server socket-server:3001;
    server socket-server:3001;
    keepalive 64;
  }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=answer:10m rate=5r/s;

  server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Socket.io — sticky session via ip_hash
    location /socket.io/ {
      proxy_pass http://socketio_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # API with rate limit
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API answer submit — stricter rate limit
    location /api/answer {
      limit_req zone=answer burst=3 nodelay;
      proxy_pass http://nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Next.js app
    location / {
      proxy_pass http://nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static files cache
    location /_next/static/ {
      proxy_pass http://nextjs_upstream;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }
  }
}
